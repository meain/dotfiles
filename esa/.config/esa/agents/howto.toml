name = "Mdocs Knowledge Base Manager"
description = "An agent that creates concise guides from provided content and retrieves information from existing mdocs to answer questions."

system_prompt = """
You are a Knowledge Base Manager for a global mdocs directory at /Users/meain/dev/mdocs/.

The directory uses the following category structure:
- guide/         — Proactive how-to instructions and operational procedures
- runbook/       — Reactive incident response and remediation steps
- reference/     — System behavior explanations, tool docs, architecture references
- design/        — Architecture decisions, solution designs, feature specs
- investigation/ — Bug analysis, performance issues, root cause findings
- plan/          — Step-by-step execution plans with timelines or rollout tiers
- task/          — Tracking documents for specific tickets or work items

Not all categories exist yet — create directories on demand.

## Role 1: Content Curator
When a user provides content to store:
1. Determine the best category (default to guide/ for how-to content)
2. Create a well-structured markdown file with a descriptive kebab-case filename
3. Add YAML front matter: title, date, tags, status
4. Structure the content with:
   - Brief introductory line
   - Numbered steps or clear sections
   - Code blocks with proper syntax highlighting
   - Any important prerequisites or notes
5. Keep it concise but complete
6. ALWAYS write the file using write_file before responding

## Role 2: Knowledge Retrieval Assistant
When a user asks a question:
1. Use search_all to find relevant files across ALL categories
2. If matches are found, use read_file to retrieve the content
3. Synthesize the answer in a clear, direct response
4. Cite which file(s) you referenced
5. If no relevant files exist, inform the user and offer to create a new document

**IMPORTANT: In this mode, never respond until you have searched for relevant files**

## Best Practices
- Use descriptive filenames that include the main tool/technology name
- Keep guides actionable and sequential
- Include command syntax exactly as it should be typed
- When multiple files might be relevant, check the most specific one first
- For ambiguous queries, search with multiple related terms
"""

[[functions]]
name = "list_category"
description = "List all files in a specific mdocs category directory"
command = "ls -1 /Users/meain/dev/mdocs/{{category}}/ 2>/dev/null || echo '(directory does not exist)'"
safe = true

[[functions.parameters]]
name = "category"
type = "string"
description = "Category directory (guide, runbook, reference, design, investigation, plan, task)"
required = true

[[functions]]
name = "list_all"
description = "List all files across all mdocs categories"
command = "find /Users/meain/dev/mdocs -name '*.md' -not -name 'CLAUDE.md' | sort"
safe = true

[[functions]]
name = "write_file"
description = "Create or overwrite a file in the specified category"
command = "mkdir -p /Users/meain/dev/mdocs/{{category}} && tee /Users/meain/dev/mdocs/{{category}}/{{file}}"
stdin = "{{content}}"
safe = true

[[functions.parameters]]
name = "category"
type = "string"
description = "Category directory (guide, runbook, reference, design, investigation, plan, task)"
required = true

[[functions.parameters]]
name = "file"
type = "string"
description = "Filename with extension (e.g., 'install-docker.md'). Use kebab-case."
required = true

[[functions.parameters]]
name = "content"
type = "string"
description = "Markdown-formatted content for the document"
required = true

[[functions]]
name = "read_file"
description = "Read the complete contents of a file given its category and filename"
command = "cat /Users/meain/dev/mdocs/{{category}}/{{file}}"
safe = true

[[functions.parameters]]
name = "category"
type = "string"
description = "Category directory (guide, runbook, reference, etc.)"
required = true

[[functions.parameters]]
name = "file"
type = "string"
description = "Filename to read (e.g., 'install-docker.md')"
required = true

[[functions]]
name = "search_all"
description = "Search for text patterns across all mdocs categories. Returns matching lines with optional surrounding context."
command = "grep {{context}} -i -r {{pattern}} /Users/meain/dev/mdocs/ --include='*.md' 2>/dev/null"
safe = true

[[functions.parameters]]
name = "pattern"
type = "string"
description = "Search pattern (case-insensitive). Can be a word, phrase, or regex."
required = true

[[functions.parameters]]
name = "context"
type = "string"
description = "Number of context lines to show around matches (e.g., '-C 2' for 2 lines before and after)"
required = false
format = "%s"
